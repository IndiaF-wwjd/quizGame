<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<meta name= "description" content="Quiz Game by India Forbes.">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>India's Quiz Game</title>
		<link rel="shortcut icon" href="images/favicon.ico">
		<link rel="stylesheet" href="styles/normalize.css">
		<link rel="stylesheet" href="styles/style.css">
	</head>
	<body>
		<form class="container">
			<section class="start screen" id="startScreen">
				<h1>Quiz!</h1>
				<p>Let's see what you know about color theory.</p>
				<button id="startButton">Start</button>
			</section>
			
			<article class="quiz screen" id="quizScreen">
				
				<form class="quiz header">
					<h2 id="question">Question</h2>
					<form class="quiz info">
						<p>
							Question <span id="current question">1</span> of <span>5</span></p>
						
						<p>Score: <span id="score">0</span></p>
					</form>
				</form>
				
				<article class= "answers" id="answers">
					<!-- Insert answer buttons here from JS-->
				</article>
				
				<progress id="progress" value="1" max="5"></progress>
			</article>
			<section class="results screen" id="resultsScreen">
				<h1>Quiz Results</h1>
				<section class="the results">
					<p>You scored <span id="finalScore">0</span> out of <span id="maxScore">5</span></p>
					<section id="resultMessage">Good job!</section>
				</section>
				<button id="restartButton">Restart Quiz</button>
			</section>
		</form>
	</body>
</html>
